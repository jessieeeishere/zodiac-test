<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你现在的性格更像什么星座</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    padding: 20px;
    margin: 0;
    color: #222;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    margin: 0 0 18px;
    font-size: 30px;
  }
  .progress {
    height: 10px;
    background: #ececec;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .bar {
    height: 100%;
    background: linear-gradient(90deg, #ffd8e6, #cbeeff);
    border-radius: 999px;
    transition: width 0.25s ease;
  }
  .page-indicator {
    color: #666;
    margin-bottom: 8px;
    font-size: 15px;
  }
  .question {
    font-size: 22px;
    line-height: 1.6;
    margin: 14px 0 20px;
    font-weight: 600;
  }
  .options {
    display: grid;
    gap: 12px;
  }
  .option {
    border: 1px solid #ececec;
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: block;
    line-height: 1.7;
    background: #fff;
  }
  .option:hover {
    border-color: #c9dfff;
    background: #fafcff;
  }
  .option input {
    margin-right: 10px;
  }
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 24px;
  }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #9fc4ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    min-width: 120px;
  }
  button:hover { opacity: 0.95; }
  button:disabled {
    background: #cfcfcf;
    cursor: not-allowed;
  }
  .result-wrap {
    text-align: center;
    padding-top: 8px;
  }
  .result-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .result-img {
    width: min(260px, 70vw);
    height: auto;
    display: block;
    margin: 0 auto 16px;
    border-radius: 18px;
  }
  .result-name {
    font-size: 28px;
    font-weight: 700;
    margin: 8px 0 12px;
  }
  .result-tags {
    font-size: 18px;
    font-weight: 700;
    color: #7a7a7a;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .result-desc {
    text-align: left;
    line-height: 2;
    font-size: 17px;
    background: #fafafa;
    border: 1px solid #f0f0f0;
    border-radius: 16px;
    padding: 18px;
    margin-top: 8px;
  }
  .restart {
    margin-top: 22px;
  }
  .error-box, .loading-box {
    text-align: center;
    padding: 40px 20px;
    line-height: 1.9;
    font-size: 18px;
  }
  .token-tip {
    font-size: 14px;
    color: #888;
    margin-bottom: 10px;
    text-align: center;
    word-break: break-all;
  }
</style>
</head>
<body>
<div class="container">
  <h1>✨ 你现在的性格更像什么星座 ✨</h1>
  <div id="app"></div>
</div>

<script>
let current = 0;
let answers = new Array(30).fill(null);
let currentToken = null;
let resultFromServer = null;
let linkChecked = false;

const questions = [
{q:"到了一个第一次去的地方，你通常会先：",A:"打开手机随便看看",B:"到处看看周围有什么",C:"先让自己适应一下环境",D:"找个合适的位置待下来"},
{q:"周末原本空着，后来有人来约你，你多半会：",A:"看那天整体状态再决定",B:"把这天改成外出安排",C:"想想这样安排划不划算",D:"先看看原本想怎么过"},
{q:"去一家没吃过的店时，你点单更接近：",A:"选一个不太会出错的",B:"选当下最有感觉的",C:"先看一圈再决定",D:"选一个看起来最特别的"},
{q:"原本打算做的事情临时变了，你一般会：",A:"先缓一下再看后面",B:"尽量把原来的部分保留下来",C:"换个方向继续往下走",D:"重新理一理接下来怎么排"},
{q:"跟不太熟的人坐在一起时，你通常会：",A:"根据当时气氛来反应",B:"很自然地进入那个场合",C:"先看对方是什么类型的人",D:"维持礼貌但不过多表现"},
{q:"买一件比较重要的东西时，你更像：",A:"会反复比较不同选择",B:"倾向选平时熟悉的类型",C:"更在意自己最后是不是喜欢",D:"看到合适的就定下来"},
{q:"一部剧刚开始追的时候，你比较可能：",A:"看当天有没有进入状态",B:"往后多看几集",C:"一边看一边琢磨细节",D:"按自己的节奏慢慢看"},
{q:"出门前发现计划里有一环不太顺了，你会：",A:"把前后顺序重新理一下",B:"顺着现有条件改一改",C:"先看这件事还值不值得做",D:"尽量按原先安排继续"},
{q:"朋友之间聊天冷下来时，你一般会：",A:"让场子重新动起来",B:"看当时大家是不是都想继续",C:"想想换什么内容比较合适",D:"让气氛就那样自然停一下"},
{q:"要开始碰一个以前没接触过的内容时，你通常：",A:"先碰一碰再说",B:"看自己有没有兴趣继续往里走",C:"找一个比较稳的入门方式",D:"先弄清楚它大概怎么回事"},
{q:"别人对你的看法和你预想的不一样时，你更可能：",A:"继续按自己的方式来",B:"会在心里拆开想一遍",C:"当下会有些感觉",D:"表面上先放过去"},
{q:"跟朋友一起旅行时，你更舒服的状态是：",A:"路上可以边走边改",B:"整体感觉舒服最重要",C:"关键节点最好想清楚",D:"大体安排先定下来"},
{q:"如果一件事推进得比想象中慢，你通常会：",A:"看是不是哪里需要调整",B:"还是照原来的节奏做",C:"另找入口继续往前",D:"先处理一下自己的状态"},
{q:"空下来的一小段时间里，你更可能：",A:"看些能带来信息的东西",B:"随便做点轻松的事",C:"让自己停下来休息",D:"找点别的事填进去"},
{q:"听别人讲烦心事时，你更接近：",A:"容易听出问题出在哪",B:"让对方先慢慢说完",C:"会把注意力放到后面怎么办",D:"更能感受到对方当下的感觉"},
{q:"做一个不算大的选择时，你一般：",A:"会把几种可能放一起看看",B:"哪个更顺眼就选哪个",C:"有了方向就往那个走",D:"倾向选比较省心的"},
{q:"走进一个大家都不太熟的场合时，你更像：",A:"很快就进入那个状态",B:"等自己慢慢适应过来",C:"先看看这个场合的节奏",D:"先安静待在里面"},
{q:"一件事没有达到预期时，你通常会：",A:"先把现有部分收住",B:"过一会儿再回来看它",C:"从别的地方接着往下走",D:"想想到底偏在哪一环"},
{q:"你会更容易注意到别人身上的哪一类特征：",A:"做事是不是让人放心",B:"相处时有没有温度",C:"说话做事有没有层次",D:"整个人有没有劲头"},
{q:"需要在较短时间内完成任务时，你更可能：",A:"一边做一边理顺结构",B:"尽量别让自己太乱",C:"先守住不出错",D:"先把主体部分做出来"},
{q:"面对一种第一次见到的新东西，你通常：",A:"会被它带来的感觉吸引",B:"会想碰一碰看看",C:"想知道它具体是什么路数",D:"先放在旁边观察一下"},
{q:"和人相处久了以后，你更看重：",A:"在一起会不会有意思",B:"相处时是不是能懂彼此",C:"彼此是不是能靠得住",D:"交流起来是不是够顺"},
{q:"做重复性的事情时，你比较容易：",A:"按熟悉的方式继续做",B:"想换个方式做做看",C:"做着做着飘到别处去",D:"过程中顺手改一改细节"},
{q:"别人打断你原本的安排时，你通常：",A:"当下会有点不舒服",B:"还是惦记原来的安排",C:"先接住眼前这个变化",D:"会想这件事值不值得切过去"},
{q:"如果周围环境很安静，你更接近：",A:"脑子里容易开始想事情",B:"会让那个空间动起来",C:"更容易沉到自己的感受里",D:"觉得这样也挺好"},
{q:"别人来找你帮忙时，你更常见的反应是：",A:"陪着一起往前推进",B:"帮对方理一理办法",C:"先顾到对方当时的状态",D:"先把局面稳下来"},
{q:"面对不太确定的情况时，你一般：",A:"边走边看",B:"会比较在意心里舒不舒服",C:"倾向把风险压低一点",D:"想先弄明白再说"},
{q:"做完一件事情以后，你更容易先想到：",A:"这件事带来的变化",B:"这件事还有没有能改的地方",C:"自己做完后的整体感觉",D:"这件事后面能不能接得住"},
{q:"你平时更容易被什么留住注意力：",A:"有内容的东西",B:"新鲜的变化",C:"有情绪的东西",D:"熟悉的秩序"},
{q:"如果把理想的一天写成画面，它更像：",A:"整体氛围让人觉得舒服",B:"大致都在预想范围内",C:"中间会出现一些新情况",D:"每一段都有自己的安排"}
];

const zodiacImages = {
  "白羊座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/aries.png",
  "金牛座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/taurus.png",
  "双子座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/gemini.png",
  "巨蟹座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/cancer.png",
  "狮子座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/leo.png",
  "处女座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/virgo.png",
  "天秤座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/libra.png",
  "天蝎座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/scorpio.png",
  "射手座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/sagittarius.png",
  "摩羯座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/capricorn.png",
  "水瓶座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/aquarius.png",
  "双鱼座": "https://raw.githubusercontent.com/jessieeeishere/zodiac-test/main/zodiac-test/images/pisces.png"
};

function getTokenFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("token");
}

async function checkToken() {
  currentToken = getTokenFromUrl();
  const app = document.getElementById("app");

  if (!currentToken) {
    app.innerHTML = `
      <div class="error-box">
        <h2>缺少测试链接</h2>
        <p>当前网址中没有 token，无法开始测试。</p>
      </div>
    `;
    return false;
  }

  app.innerHTML = `
    <div class="loading-box">
      <div class="token-tip">正在验证链接：${currentToken}</div>
      <p>请稍候，正在检查测试链接是否有效...</p>
    </div>
  `;

  try {
    const res = await fetch(`/api/check-link?token=${encodeURIComponent(currentToken)}`);
    const data = await res.json();

    if (!res.ok || !data.valid) {
      app.innerHTML = `
        <div class="error-box">
          <h2>链接已失效</h2>
          <p>${data.message || "该测试链接不可用。"}</p>
        </div>
      `;
      return false;
    }

    linkChecked = true;
    return true;
  } catch (err) {
    app.innerHTML = `
      <div class="error-box">
        <h2>验证失败</h2>
        <p>网络异常，请稍后重试。</p>
      </div>
    `;
    return false;
  }
}

function render() {
  const app = document.getElementById("app");

  if (!linkChecked) return;

  if (current === 30) {
    if (!resultFromServer) {
      app.innerHTML = `
        <div class="loading-box">
          <p>正在生成你的测试结果...</p>
        </div>
      `;
      return;
    }

    const result = resultFromServer.result;
    const imgSrc = zodiacImages[result.name] || "";

    app.innerHTML = `
      <div class="progress"><div class="bar" style="width:100%"></div></div>
      <div class="page-indicator">31 / 31</div>
      <div class="result-wrap">
        <div class="result-title">你的结果：</div>
        ${imgSrc ? `<img class="result-img" src="${imgSrc}" alt="${result.name}">` : ""}
        <div class="result-name">${result.emoji} ${result.name}</div>
        <div class="result-tags">${result.tags.join("｜")}</div>
        <div class="result-desc">${result.desc}</div>
      </div>
    `;
    return;
  }

  const q = questions[current];
  const percent = (current / 30) * 100;

  app.innerHTML = `
    <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
    <div class="page-indicator">${current + 1} / 30</div>
    <div class="question">${q.q}</div>

    <div class="options">
      <label class="option"><input type="radio" name="opt" value="A" ${answers[current] === "A" ? "checked" : ""}>A. ${q.A}</label>
      <label class="option"><input type="radio" name="opt" value="B" ${answers[current] === "B" ? "checked" : ""}>B. ${q.B}</label>
      <label class="option"><input type="radio" name="opt" value="C" ${answers[current] === "C" ? "checked" : ""}>C. ${q.C}</label>
      <label class="option"><input type="radio" name="opt" value="D" ${answers[current] === "D" ? "checked" : ""}>D. ${q.D}</label>
    </div>

    <div class="nav">
      <button onclick="prev()" ${current === 0 ? "disabled" : ""}>上一题</button>
      <button onclick="next()">下一题</button>
    </div>
  `;
}

async function next() {
  const c = document.querySelector('input[name="opt"]:checked');
  if (!c) {
    alert("请先选择一个选项！");
    return;
  }

  answers[current] = c.value;

  if (current < 29) {
    current++;
    render();
    return;
  }

  // 第30题提交
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="loading-box">
      <p>正在提交答案并生成结果，请稍候...</p>
    </div>
  `;

  try {
    const res = await fetch("/api/submit-test", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token: currentToken,
        answers
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      app.innerHTML = `
        <div class="error-box">
          <h2>提交失败</h2>
          <p>${data.message || "测试提交失败，请稍后重试。"}</p>
        </div>
      `;
      return;
    }

    resultFromServer = data;
    current = 30;
    render();

  } catch (err) {
    app.innerHTML = `
      <div class="error-box">
        <h2>提交失败</h2>
        <p>网络异常，请稍后重试。</p>
      </div>
    `;
  }
}

function prev() {
  const c = document.querySelector('input[name="opt"]:checked');
  if (c) answers[current] = c.value;
  if (current > 0) current--;
  render();
}

(async function init() {
  const ok = await checkToken();
  if (ok) render();
})();
</script>
</body>
</html>
