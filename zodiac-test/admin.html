<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试链接生成后台</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f7f8fc;
    color: #222;
    padding: 28px 16px;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 28px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 30px;
    text-align: center;
  }
  .sub {
    text-align: center;
    color: #666;
    margin-bottom: 26px;
    line-height: 1.8;
  }
  .group { margin-bottom: 18px; }
  label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
  }
  input[type="password"], textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    outline: none;
  }
  input:focus, textarea:focus {
    border-color: #9fc4ff;
    box-shadow: 0 0 0 3px rgba(159,196,255,0.18);
  }
  .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  button {
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
    background: #9fc4ff;
    color: #fff;
  }
  button:hover { opacity: 0.94; }
  button.secondary { background: #95d5b2; }
  button.ghost { background: #d9d9d9; color: #333; }
  .box {
    background: #fafafa;
    border: 1px solid #eee;
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
  }
  .tips {
    margin-top: 16px;
    line-height: 1.9;
    color: #555;
    font-size: 15px;
  }
  .status {
    margin-top: 10px;
    font-size: 15px;
    color: #666;
  }
  .link-output {
    word-break: break-all;
    min-height: 54px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🔗 测试链接生成后台</h1>
    <div class="sub">
      每点一次，就生成一个<strong>全新的独立测试链接</strong>。<br>
      每条链接都只允许使用 2 次，互不干扰，可无限生成。
    </div>

    <div class="group">
      <label for="adminKey">管理员密钥</label>
      <input id="adminKey" type="password" placeholder="请输入 ADMIN_KEY">
    </div>

    <div class="row">
      <button onclick="createLink()">生成新链接</button>
      <button class="secondary" onclick="copyLink()">复制链接</button>
      <button class="ghost" onclick="clearResult()">清空结果</button>
    </div>

    <div class="box">
      <label for="resultLink">最新生成的测试链接</label>
      <textarea id="resultLink" class="link-output" readonly placeholder="点击上方按钮后，这里会出现新的测试链接"></textarea>
      <div class="status" id="statusText">等待生成</div>
    </div>

    <div class="tips">
      使用方式：<br>
      1. 输入管理员密钥<br>
      2. 点击“生成新链接”<br>
      3. 点击“复制链接”发给别人<br>
      4. 每条新链接独立可用 2 次，用完即失效<br>
      5. 你可以无限次继续生成新的链接
    </div>
  </div>

<script>
async function createLink() {
  const adminKey = document.getElementById("adminKey").value.trim();
  const resultLink = document.getElementById("resultLink");
  const statusText = document.getElementById("statusText");

  if (!adminKey) {
    alert("请先输入管理员密钥");
    return;
  }

  resultLink.value = "";
  statusText.textContent = "正在生成新链接，请稍候...";

  try {
    const res = await fetch(`/api/create-link?admin_key=${encodeURIComponent(adminKey)}`);
    const data = await res.json();

    if (!res.ok || !data.success) {
      statusText.textContent = "生成失败";
      alert(data.message || "生成链接失败");
      return;
    }

    resultLink.value = data.url;
    statusText.textContent = `生成成功：token = ${data.token}，可用次数 = ${data.remaining_uses}`;
  } catch (err) {
    statusText.textContent = "网络异常";
    alert("网络异常，生成失败");
  }
}

async function copyLink() {
  const resultLink = document.getElementById("resultLink").value.trim();
  if (!resultLink) {
    alert("还没有可复制的链接");
    return;
  }

  try {
    await navigator.clipboard.writeText(resultLink);
    alert("链接已复制");
  } catch (err) {
    alert("复制失败，请手动复制");
  }
}

function clearResult() {
  document.getElementById("resultLink").value = "";
  document.getElementById("statusText").textContent = "已清空";
}
</script>
</body>
</html>
